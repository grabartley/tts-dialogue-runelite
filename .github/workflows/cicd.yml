name: CI/CD

# Build + test ONLY. This is the PR gate: it compiles the plugin and the external engine and runs
# the full test suite (plugin tests + engine --stdio framing/manifest conformance). It deliberately
# does NOT build engine bundles, sign, notarize, or publish anything: that is the manual
# kokoro-engine-release workflow, triggered only via workflow_dispatch. The workflow_dispatch trigger here
# is just a manual re-run of the same build+test gate, never a release.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and run tests
        run: ./gradlew build

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: tts-dialogue-${{ github.sha }}
          path: build/libs/*.jar
