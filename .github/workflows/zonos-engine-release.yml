name: Zonos Engine Release

# MANUAL ONLY. This pipeline builds, checksums, and publishes the self-contained Zonos GPU engine
# bundle(s) to a GitHub Release, then regenerates zonos-engine-manifest.json. It is never triggered
# automatically: there is deliberately no `on: push` / tag trigger, mirroring engine-release.yml. A
# maintainer runs it from the Actions tab ("Run workflow") and supplies the version tag.
#
# IMPORTANT: PACKAGING NEEDS NO GPU. The bundle is assembled (PyInstaller freeze of an embedded
# Python + the PyTorch CUDA wheels + Zonos + weights) on a standard windows-latest runner. Only
# RUNNING the bundle's real synthesis needs an NVIDIA GPU, which is the end user's machine (or a
# maintainer's GPU box via the --selftest runbook in docs/engine-pipeline.md). So CI cannot run the
# real --selftest; it validates the wire framing with the torch-free mock instead.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag for the Zonos engine bundle (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        default: true
        type: boolean
      zonos_ref:
        description: "Zonos upstream git ref (sha or tag) to pin for a reproducible bundle"
        required: false
        default: "main"
        type: string
      torch_index:
        description: "PyTorch CUDA wheel index URL"
        required: false
        default: "https://download.pytorch.org/whl/cu124"
        type: string
      skip_weights:
        description: "Build a smaller bundle that fetches weights on first run instead of embedding"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  # One job per CUDA-capable target. Windows x64 is the primary gaming-PC target for v1; linux-x64 is
  # wired here behind a flag for a later follow-up. macOS is intentionally absent: Zonos targets
  # CUDA/NVIDIA, so there is no Apple-GPU bundle and the plugin correctly falls back to Kokoro there.
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win-x64
            os: windows-latest
            kokoro_platform: win-x64
            kokoro_launcher: kokoro-engine.bat
          # - platform: linux-x64
          #   os: ubuntu-latest   # uncomment to also ship the Linux x64 (NVIDIA) bundle
          #   kokoro_platform: linux-x64
          #   kokoro_launcher: kokoro-engine
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the Kokoro engine image (for reference-voice generation)
        shell: bash
        run: |
          set -euo pipefail
          # The Zonos reference clips are generated from the Kokoro CPU engine, so build its image
          # here. This needs no GPU and runs on the same windows-latest runner that packages Zonos.
          ./gradlew :engine:engineImage -PtargetPlatform=${{ matrix.kokoro_platform }}

      - name: Download and extract the Kokoro model
        shell: bash
        env:
          MODEL_NAME: kokoro-multi-lang-v1_0
        run: |
          set -euo pipefail
          IMG="engine/build/engine-image"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/${MODEL_NAME}.tar.bz2"
          echo "Downloading Kokoro model bundle (~349 MB) from $URL"
          curl -fL --retry 3 -o model.tar.bz2 "$URL"
          mkdir -p "$IMG"
          tar -xjf model.tar.bz2 -C "$IMG"
          # The engine resolves a 'model' directory beside the image; normalise the extracted name.
          mv "$IMG/${MODEL_NAME}" "$IMG/model"
          rm -f model.tar.bz2
          test -f "$IMG/model/model.onnx"

      - name: Generate reference-voice bank from Kokoro
        shell: bash
        run: |
          set -euo pipefail
          # Drive the Kokoro engine to synthesize one <id>.wav per Zonos voice id (same race/gender
          # /player as the matching Kokoro speaker), populating engine-zonos/voices/ before packaging.
          # build_bundle.py then asserts the bank is complete; a release needs no manual clip staging.
          LAUNCHER="engine/build/engine-image/${{ matrix.kokoro_launcher }}"
          if [ "${{ matrix.platform }}" != "win-x64" ]; then chmod +x "$LAUNCHER"; fi
          python engine-zonos/scripts/generate_reference_voices.py --engine-launcher "$LAUNCHER"
          ls -la engine-zonos/voices/

      - name: Build self-contained Zonos bundle
        shell: bash
        run: |
          set -euo pipefail
          ARGS="--platform ${{ matrix.platform }} --version ${{ inputs.version }}"
          ARGS="$ARGS --zonos-ref ${{ inputs.zonos_ref }} --torch-index ${{ inputs.torch_index }}"
          if [ "${{ inputs.skip_weights }}" = "true" ]; then ARGS="$ARGS --skip-weights"; fi
          python engine-zonos/packaging/build_bundle.py $ARGS

      - name: Verify bundle checksum exists
        shell: bash
        run: |
          set -euo pipefail
          OUT="engine-zonos/dist/${{ matrix.platform }}"
          ls -la "$OUT"
          test -f "$OUT"/*.zip
          test -f "$OUT"/*.zip.sha256

      - name: Split bundle into sub-2GiB release parts
        shell: bash
        run: |
          set -euo pipefail
          # GitHub caps release assets at 2 GiB/file; the self-contained Zonos bundle is ~2.97 GB, so
          # a single-.zip upload returns HTTP 422 (issue #60). Split the .zip into ordered parts well
          # under the cap (1900 MiB leaves comfortable margin) and keep the combined .zip.sha256
          # already written by build_bundle.py (it hashes the reassembled archive). Then checksum
          # each part and drop the original .zip so only the parts + sidecars are uploaded.
          OUT="engine-zonos/dist/${{ matrix.platform }}"
          ZIP=$(ls "$OUT"/*.zip)
          # Deterministic two-digit ordinals: <bundle>.zip.part00, .part01, ... in reassembly order.
          split -b 1900m -d -a 2 "$ZIP" "${ZIP}.part"
          for PART in "${ZIP}".part*; do
            sha256sum "$PART" | awk '{print $1}' > "${PART}.sha256"
          done
          rm -f "$ZIP"
          echo "Split $(basename "$ZIP") into:"
          ls -la "$OUT"
          # Fail loud if no part00 was produced (e.g. an empty/missing zip).
          test -f "${ZIP}.part00"

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: zonos-engine-${{ matrix.platform }}
          path: engine-zonos/dist/${{ matrix.platform }}/*

  # Gather every built target, generate the Zonos manifest, publish the Release, and open an auto-PR
  # to commit the refreshed manifest so the plugin resource matches the published bundles.
  publish:
    name: Publish release + manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Normalise artifact layout
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          for d in zonos-engine-*; do
            mv "$d" "${d#zonos-engine-}"
          done
          ls -R .

      - name: Generate zonos-engine-manifest.json
        shell: bash
        run: |
          python3 engine-zonos/packaging/generate_zonos_manifest.py \
            --version "${{ inputs.version }}" \
            --release-tag "zonos-${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --artifacts-dir release-artifacts \
            --out src/main/resources/zonos-engine-manifest.json
          cat src/main/resources/zonos-engine-manifest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="zonos-${{ inputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists, refreshing assets"
          else
            gh release create "$TAG" \
              --title "Zonos GPU engine ${{ inputs.version }}" \
              --notes "Self-contained Zonos GPU TTS engine bundle (embedded Python + PyTorch CUDA + Zonos + weights). Needs only an NVIDIA driver. See zonos-engine-manifest.json for per-OS sha256." \
              ${{ inputs.prerelease && '--prerelease' || '' }}
          fi
          # Upload each bundle part + every sha256 sidecar. A split bundle (issue #60) lands as
          # ordered <bundle>.zip.partNN files plus per-part .sha256 and the combined <bundle>.zip
          # .sha256; a single-file bundle (if ever under the cap) lands as <bundle>.zip + .sha256.
          # Matching '*.zip', '*.part*', and '*.sha256' covers all three. A per-file loop (not
          # find -exec) so any failed upload fails the step: find -exec swallows the per-file exit
          # code, which previously let an oversize bundle (HTTP 422) report SUCCESS while the asset
          # was missing.
          while IFS= read -r -d '' f; do
            gh release upload "$TAG" "$f" --clobber \
              || { echo "::error::release asset upload failed for $f"; exit 1; }
          done < <(find release-artifacts -type f \( -name '*.zip' -o -name '*.part*' -o -name '*.sha256' \) -print0)

      - name: Commit refreshed manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet src/main/resources/zonos-engine-manifest.json; then
            echo "Manifest unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="zonos-engine-manifest/${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add src/main/resources/zonos-engine-manifest.json
          git commit -m "chore: update zonos-engine-manifest.json for ${{ inputs.version }}"
          # ALWAYS push the branch first (needs only contents: write); the refreshed manifest is
          # then never lost even if PR creation is blocked.
          git push --force-with-lease origin "$BRANCH"
          # Opening the PR additionally needs pull-requests: write AND the repo setting "Allow
          # GitHub Actions to create and approve pull requests". If that setting is disabled the
          # create still fails, so fall back to a clear maintainer instruction rather than dropping
          # the manifest on the floor.
          if ! gh pr create --base main --head "$BRANCH" \
            --title "chore: zonos-engine-manifest.json for ${{ inputs.version }}" \
            --body "Auto-generated by the zonos-engine-release workflow so the bundled manifest matches the published Zonos bundles for ${{ inputs.version }}."; then
            echo "::warning::Could not open the manifest PR automatically. The refreshed manifest is pushed to branch '$BRANCH'; open a PR from it manually (and check the repo's 'Allow GitHub Actions to create and approve pull requests' setting)."
          fi
