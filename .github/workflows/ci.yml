name: CI

# Pull requests are the build/test gate: compile the plugin, run the full test suite (plugin tests +
# engine --stdio framing/manifest conformance), and build the standalone shadow jar as a downloadable
# artifact. The manual release pipeline lives in release.yml.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and run tests
        run: ./gradlew build

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Upload shadow JAR
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: voiced-dialogue-${{ github.sha }}
          path: build/libs/*-all.jar
