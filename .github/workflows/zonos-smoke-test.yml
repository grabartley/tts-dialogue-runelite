name: Zonos Frozen-Import Smoke Test

# FULL-GRAPH guard for the frozen Zonos engine's import path (issue #103).
#
# The recurring Zonos GPU failure -- `CPU dispatcher tracer already initlized` /
# `cannot load module more than once per process` -- is a numpy IMPORT-TIME double-init, NOT a CUDA
# runtime error. It fires the instant the PyInstaller-frozen `import torch` re-initializes numpy's C
# extension a second time, BEFORE any GPU call. So a plain GPU-less runner that freezes the real
# module graph and runs `import torch` reproduces (or clears) this whole bug class with full fidelity.
#
# This job freezes the SAME module graph as the shipped engine -- it builds smoke-import.spec, which
# calls the SAME shared collection recipe (packaging/_collect.py: collect_engine_deps) as the real
# zonos-engine.spec -- and RUNS the frozen exe. The earlier smoke (#99) froze only torch + numpy and
# excluded zonos/phonemizer, so it validated a different bundle than ships; this one cannot.
#
# It uses CPU torch wheels (not the multi-GB cu124 build): the double-init is GPU-independent and
# CPU wheels exercise the identical PyInstaller `cleanup_loaded_modules` + numpy re-import path, so
# the smoke stays faithful to the import bug class without the GPU runtime. Note it is NOT single-digit
# minutes: PyInstaller-freezing the full torch graph dominates (~25-35 min on a Windows runner, same as
# the real bundle's freeze minus the 2.9GB weight download). Still far cheaper than shipping a broken
# bundle: CPU-only, no weights, and it gates the real build before any download or upload happens.
#
# PASS = the frozen exe imports torch + zonos and runs cuda_available() cleanly (a False GPU result
# on the GPU-less runner is fine). FAIL = the exe crashes, exits non-zero, or its output contains a
# double-load marker. zonos-engine-release.yml runs this SAME freeze as a hard pre-build gate.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - engine-zonos/packaging/requirements.txt
      - engine-zonos/packaging/_collect.py
      - engine-zonos/packaging/zonos-engine.spec
      - engine-zonos/packaging/smoke_import.py
      - engine-zonos/packaging/smoke-import.spec
      - engine-zonos/zonos_engine/synthesizer.py
      - .github/workflows/zonos-smoke-test.yml

permissions:
  contents: read

jobs:
  smoke:
    name: Frozen full-graph import (win-x64, no GPU)
    # windows-latest + frozen: this is where the double-load surfaced and the shipped bundle's target,
    # so reproduce it there. No GPU: the double-init surfaces at import, before any CUDA call.
    runs-on: windows-latest
    # The full-graph PyInstaller freeze of torch takes ~25-35 min on a Windows runner; 25 was too tight
    # (the freeze got cancelled mid-run). 50 leaves headroom while still catching a genuine hang.
    timeout-minutes: 50
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # torch 2.4.1 only ships cp38..cp312 wheels, so the frozen interpreter must be 3.12 (same as
          # the real build) for the frozen graph to match production.
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-suffix: zonos-smoke
          cache-dependency-glob: engine-zonos/packaging/requirements.txt

      - name: Create venv + install the FULL frozen-import graph (CPU torch)
        shell: bash
        working-directory: engine-zonos
        run: |
          set -euo pipefail
          # Install the SAME runtime deps as the real bundle (packaging/requirements.txt: torch,
          # torchaudio, numpy<2.4, phonemizer, pyinstaller) PLUS zonos from git -- the full graph the
          # release freezes -- but from the CPU torch index, not cu124. The import-time double-init is
          # GPU-independent, so CPU wheels reproduce it faithfully while keeping the job cheap/fast.
          uv venv .smoke-venv --python 3.12
          uv pip install --python .smoke-venv \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -r packaging/requirements.txt
          # Zonos is not on PyPI; install from its upstream git repo (same source as the real build).
          uv pip install --python .smoke-venv "git+https://github.com/Zyphra/Zonos.git@main"

      - name: Show resolved torch + numpy versions (unfrozen)
        shell: bash
        working-directory: engine-zonos
        run: |
          set -euo pipefail
          .smoke-venv/Scripts/python -c "import numpy, torch; print('numpy', numpy.__version__); print('torch', torch.__version__)"

      - name: PyInstaller-freeze the FULL-GRAPH import probe
        shell: bash
        working-directory: engine-zonos
        run: |
          set -euo pipefail
          # Invoke from engine-zonos so the spec's os.getcwd()-relative entry + _collect import resolve
          # exactly like the real build invokes zonos-engine.spec.
          .smoke-venv/Scripts/python -m PyInstaller \
            --noconfirm --clean \
            --distpath build/smoke-dist \
            --workpath build/smoke-work \
            packaging/smoke-import.spec

      - name: Run the frozen import probe and check for the double-load
        shell: bash
        working-directory: engine-zonos
        run: |
          set -euo pipefail
          EXE="build/smoke-dist/smoke-import/smoke-import.exe"
          test -f "$EXE" || { echo "::error::frozen smoke exe not found at $EXE"; exit 1; }
          # ALWAYS capture and echo the full output so a failure shows the traceback. Do not let a
          # non-zero exit abort before we have printed it.
          set +e
          OUT=$("$EXE" 2>&1)
          CODE=$?
          set -e
          echo "===== frozen smoke-import output (exit=$CODE) ====="
          echo "$OUT"
          echo "=================================================="
          if echo "$OUT" | grep -qE "cannot load module more than once per process|CPU dispatcher tracer already initlized"; then
            echo "::error::FROZEN IMPORT FAILED: numpy import-time double-init detected in the full module graph."
            exit 1
          fi
          if [ "$CODE" -ne 0 ]; then
            echo "::error::frozen smoke-import exited non-zero ($CODE) without a double-load marker; see output above."
            exit 1
          fi
          echo "PASS: frozen full-graph import (torch + zonos + cuda_available) succeeded with numpy<2.4."
