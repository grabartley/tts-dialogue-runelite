plugins {
	id 'java'
	id 'com.diffplug.spotless' version '6.25.0'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()

	// sherpa-onnx is not published to Maven Central. Resolve its prebuilt
	// jars straight from the k2-fsa GitHub release assets via an ivy layout.
	// Asset layout: <tag>/<artifact>-<tag>.jar, e.g. v1.13.3/sherpa-onnx-v1.13.3.jar
	ivy {
		url = 'https://github.com/k2-fsa/sherpa-onnx/releases/download'
		patternLayout {
			artifact '[revision]/[artifact]-[revision].jar'
		}
		metadataSources { artifact() }
		content { includeGroup 'com.k2fsa' }
	}
}

def runeLiteVersion = 'latest.release'
def sherpaOnnxVersion = 'v1.13.3'

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'

	// In-process Kokoro TTS via sherpa-onnx (k2-fsa). The pure-Java API jar is
	// needed at compile time; the JNI native lib jar is runtime only and is
	// auto-extracted from the classpath by sherpa-onnx's library loader.
	implementation "com.k2fsa:sherpa-onnx:${sherpaOnnxVersion}"
	// Bundle the native lib for the host platform. Swap/add the line below for
	// other platforms when distributing:
	//   sherpa-onnx-native-lib-osx-aarch64   (macOS Apple Silicon)
	//   sherpa-onnx-native-lib-osx-x64       (macOS Intel)
	//   sherpa-onnx-native-lib-linux-x64     (Linux x64)
	//   sherpa-onnx-native-lib-linux-aarch64 (Linux arm64)
	//   sherpa-onnx-native-lib-win-x64       (Windows x64)
	runtimeOnly "com.k2fsa:sherpa-onnx-native-lib-osx-aarch64:${sherpaOnnxVersion}"

	// Extracts the Kokoro model bundle (tar.bz2) on first run.
	implementation 'org.apache.commons:commons-compress:1.26.2'

	testImplementation 'junit:junit:4.12'
	testImplementation 'org.mockito:mockito-core:5.12.0'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
	// Put the standalone engine's classes on the plugin test classpath so the drift guard
	// (SpeakerMatrixVoiceProfileDriftTest) can load the real SpeakerMatrix alongside the plugin's
	// VoiceManager.VoiceProfile and assert their (player, race, gender) -> speakerId mappings never
	// diverge. The engine deliberately duplicates this table because it cannot depend on the
	// RuneLite-coupled plugin classes; this test is the automated guard against silent drift.
	testImplementation project(':engine')
}

group = 'com.grahambartley'
version = '1.0-SNAPSHOT'

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(17)
}

tasks.register('shadowJar', Jar) {
	dependsOn configurations.testRuntimeClasspath
	manifest {
		attributes('Main-Class': 'com.grahambartley.TTSDialoguePluginTest', 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from sourceSets.test.output
	from {
		configurations.testRuntimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}

tasks.withType(JavaExec).configureEach {
	jvmArgs += [
			"--add-exports=java.desktop/com.apple.eawt=ALL-UNNAMED"
	]
}

spotless {
	java {
		googleJavaFormat('1.17.0')
		target 'src/**/*.java'
	}
}

tasks.register('installGitHook', Copy) {
	from("$rootDir/scripts/pre-commit")
	into("$rootDir/.git/hooks")
	fileMode = 0755
}

tasks.named('build') {
	dependsOn 'spotlessCheck'
}